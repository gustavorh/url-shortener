name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint, typecheck, unit tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r lint
      - run: pnpm -r typecheck
      - run: pnpm -r test:unit
      # Fail the build if the committed OpenAPI spec no longer matches what
      # the shared Zod schemas would generate. Keeps /docs in sync with the
      # actual API surface without anyone having to remember.
      - run: pnpm --filter @linkly/web openapi:check
      - run: pnpm --filter @linkly/web build
        env:
          AUTH_SECRET: ci-build-placeholder-secret

  integration:
    name: Integration tests (MySQL)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: linkly_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: linkly_test
      DB_NAME_TEST: linkly_test
      INTEGRATION_DB: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Smoke-test that every migration applies cleanly.
      - name: Apply migrations
        run: pnpm --filter @linkly/web exec sequelize-cli db:migrate --env test
      - run: pnpm --filter @linkly/web test:integration

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: linkly_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: linkly_test
      DB_NAME_TEST: linkly_test
      AUTH_SECRET: e2e-ci-secret-do-not-use-in-prod
      NEXT_PUBLIC_BASE_URL: http://127.0.0.1:3001
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply migrations
        run: pnpm --filter @linkly/web exec sequelize-cli db:migrate --env test
      - name: Install Playwright browsers
        run: pnpm --filter @linkly/web exec playwright install --with-deps chromium
      - run: pnpm --filter @linkly/web test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
